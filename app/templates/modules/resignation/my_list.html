{% extends 'layouts/main_layout.html' %}

{% block title %}Đơn nghỉ việc của tôi — HRM{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/resignation.css') }}">
{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-between mb-4">
    <div>
        <h4 class="fw-bold mb-0">Đơn nghỉ việc của tôi</h4>
        <p class="text-muted small mb-0">Theo dõi trạng thái các đơn bạn đã gửi.</p>
    </div>
    <a href="{{ url_for('resignation.submit_form') }}" class="btn btn-primary">
        <i class="fas fa-plus me-1"></i> Gửi đơn mới
    </a>
</div>

<!-- Filter -->
<form id="resignFilterForm" class="filter-bar">
    <label class="fw-semibold small text-nowrap">Lọc theo:</label>
    <select name="status" class="form-select form-select-sm">
        <option value="">Tất cả trạng thái</option>
        <option value="PENDING_MANAGER">Chờ Manager duyệt</option>
        <option value="PENDING_HR">Chờ HR xử lý</option>
        <option value="PENDING_ADMIN">Chờ Admin duyệt</option>
        <option value="APPROVED">Đã duyệt</option>
        <option value="REJECTED">Từ chối</option>
    </select>
</form>

<!-- Danh sách -->
<div id="resignListContainer"></div>
<div id="resignPagination"></div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/modules/resignation/resignation_api.js') }}"></script>
<script src="{{ url_for('static', filename='js/modules/resignation/resignation.js') }}"></script>
{% endblock %}

{% extends "layouts/base.html" %}

{% block content %}
<div class="container">

  <h3>Chấm công</h3>

  <div class="card p-3 text-center">
    <h4>{{ now }}</h4>

    <div class="my-3">
      <button class="btn btn-success btn-lg">
        🔳 CHECK-IN
      </button>

      <button class="btn btn-warning btn-lg">
        🔳 CHECK-OUT
      </button>
    </div>

    <div>
      Trạng thái: {{ today.status }}
    </div>

  </div>

  <hr>

  <h5>Lịch sử</h5>

  {% for a in history %}
    <div>
      {{ a.date }} | {{ a.check_in }} → {{ a.check_out }}
    </div>
  {% endfor %}

</div>
{% endblock %}

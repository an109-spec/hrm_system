{% extends "layouts/base.html" %}

{% block content %}
<div class="container">

  <h3>Tìm kiếm</h3>

  <input class="form-control" placeholder="Search...">

  {% for e in results %}

      {{ e.full_name }} - {{ e.position.job_title }}
    </div>
  {% endfor %}

</div>
{% endblock %}

{% extends "layouts/base.html" %}

{% block content %}
<div class="container">

  <h3>Thông báo</h3>

  {% for n in notifications %}
    <div class="card p-2 mb-2 {% if not n.is_read %}border-primary{% endif %}">
      <b>{{ n.title }}</b>
      <div>{{ n.content }}</div>
      <small>{{ n.created_at }}</small>
    </div>
  {% endfor %}

</div>
{% endblock %}

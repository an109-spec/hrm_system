{% extends "layouts/base.html" %}

{% block content %}
<div class="container">

  <h3>Bảng lương</h3>

  {% for s in salaries %}
    <div class="card p-2 mb-2">
      <div>Tháng: {{ s.month }}/{{ s.year }}</div>
      <div>Lương: {{ s.net_salary }}</div>
      <div>Trạng thái: {{ s.status }}</div>
    </div>
  {% endfor %}

</div>
{% endblock %}

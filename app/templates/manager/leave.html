{% extends "layouts/base.html" %}
{% block title %}Duyệt nghỉ phép{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/manager/leave.css') }}">
{% endblock %}
{% block content %}
<h2>📂 Quản lý đơn nghỉ phép</h2>
<div class="leave-toolbar">
  <select id="statusFilter"><option value="pending">🟡 Chờ duyệt</option><option value="approved">🟢 Đã duyệt</option><option value="rejected">❌ Từ chối</option><option value="">Tất cả</option></select>
</div>
<table>
  <thead><tr><th>STT</th><th>Nhân viên</th><th>Loại nghỉ</th><th>Thời gian</th><th>Ngày gửi</th><th>Trạng thái</th><th>Thao tác</th></tr></thead>
  <tbody id="leave-body"></tbody>
</table>
<div id="leave-modal" class="modal" hidden>
  <div class="modal-content">
    <button class="close" id="close-modal">×</button>
    <h3>📄 Chi tiết đơn xin nghỉ</h3>
    <div id="leave-detail"></div>
    <textarea id="leave-note" placeholder="Nhập ghi chú phản hồi..."></textarea>
    <div class="modal-actions">
      <button id="approve-btn">✔️ Duyệt ngay</button>
      <button id="reject-btn" class="danger">❌ Từ chối</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/api/manager.api.js') }}"></script>
<script src="{{ url_for('static', filename='js/manager/leave.js') }}"></script>
{% endblock %}

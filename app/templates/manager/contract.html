{% extends "layouts/base.html" %}
{% block title %}Hợp đồng{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/manager/contract.css') }}">
{% endblock %}

{% block content %}
<h2 class="page-title">📄 Hợp đồng sắp hết hạn</h2>
<div class="contract-warning"><h3>⚠️ Sắp hết hạn (&lt; 30 ngày)</h3><ul id="contract-list"></ul></div>
<div id="contract-error" class="state error" hidden></div>
<div id="contract-modal" class="modal" hidden>
  <div class="modal-content">
    <span class="close" id="close-modal">&times;</span>

    <h3>📝 Gia hạn hợp đồng</h3>

    <input id="emp_id" placeholder="Employee ID" readonly>
    <input id="old_code" placeholder="Mã hợp đồng cũ" readonly>
    <input id="code" placeholder="Mã hợp đồng mới">
    <input id="salary" type="number" placeholder="Lương cơ bản mới">
    <input id="start" type="date">
    <input id="end" type="date">
    <div class="modal-actions"><button class="btn-success" id="submit-renew">✅ Xác nhận gia hạn</button><button class="btn-danger" id="cancel-renew">❌ Hủy</button></div>
  </div>
</div>

{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/api/manager.api.js') }}"></script>
<script src="{{ url_for('static', filename='js/manager/contract.js') }}"></script>
{% endblock %}
